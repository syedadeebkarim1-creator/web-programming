<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Calculator</title>
    <style>
        #calculator {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        #calculator input {
            padding: 5px;
            font-size: 16px;
        }
        #calculator p {
            margin: 0;
        }
    </style>
</head>
<body>
    <h1>Welcome to my Calculator!</h1>
    <p>This calculator asks for a whole number, then an operator, and then another whole number to do the calculation.</p>
    <div id="calculator">
        <input type="text" id="number1" placeholder="Enter first number">
        <input type="text" id="operator" placeholder="Enter operator">
        <input type="text" id="number2" placeholder="Enter second number">
        <p>=</p>
        <p id="result"></p>
    </div>
    <p>The operator section only accepts <b>+</b> for addition, <b>-</b> for subtraction, <b>*</b> for multiplication, and <b>/</b> for division.</p>
    <script>
        var number1Input = document.getElementById('number1');
        var operatorInput = document.getElementById('operator');
        var number2Input = document.getElementById('number2');
        var resultDisplay = document.getElementById('result');

        function calculate() {
            var num1 = parseInt(number1Input.value);
            var operator = operatorInput.value.trim();
            var num2 = parseInt(number2Input.value);

            let result;
            
            if (operator === '+') {
                result = num1 + num2;
            }
            else if (operator === '-') {
                result = num1 - num2;
            }
            else if (operator === '*') {
                result = num1 * num2;
            }
            else if (operator === '/') {
                result = num1 / num2;
            }

            resultDisplay.textContent = result;
        }

        number1Input.addEventListener('input', calculate);
        operatorInput.addEventListener('input', calculate);
        number2Input.addEventListener('input', calculate);
    </script>
</body>
</html>
